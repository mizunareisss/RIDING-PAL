<!DOCTYPE html>
<!-- RIDING-PAL · first public deploy: 2026-04-20 -->
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>Ride 3D · 昌平公路骑行</title>
<style>
  :root {
    --bg: #0d0d0d;
    --fg: #d8e6ff;
    --accent: #00e5ff;
    --accent-dim: #00e5ff22;
    --magenta: #ff3ea5;
    --muted: #5d8ca8;
    --border: rgba(0, 229, 255, 0.20);
    --panel: rgba(10, 10, 10, 0.52);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--fg);
    font-family: 'SF Mono', Menlo, 'JetBrains Mono', monospace; }
  #canvas { position: fixed; inset: 0; display: block; }
  .panel {
    position: fixed;
    background: var(--panel);
    border: 1px solid var(--border);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    padding: 14px 16px;
    border-radius: 2px;
    box-shadow: 0 0 30px rgba(0, 229, 255, 0.08) inset;
    font-size: 11px;
    letter-spacing: 0.06em;
  }
  #ui { top: 20px; left: 20px; min-width: 240px; }
  #legend { top: 20px; right: 20px; min-width: 180px; display: none; }
  #compass { bottom: 20px; right: 20px; width: 110px; height: 110px; padding: 0; display: flex; align-items: center; justify-content: center; }
  #compass svg { width: 92%; height: 92%; }

  /* dashboard */
  #dashboard { bottom: 20px; left: 20px; width: 380px; padding: 18px 22px; }
  .dash-title {
    font-size: 10.5px;
    letter-spacing: 0.32em;
    color: var(--accent);
    opacity: 0.85;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 14px;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .dash-title .dash-live {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.18em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dash-title .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 6px var(--accent);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ---- groups (sections): Controls / Telemetry ---- */
  .dash-group { margin-bottom: 20px; }
  .dash-group:last-child { margin-bottom: 0; }
  .dash-group-head {
    font-size: 10px; letter-spacing: 0.3em; color: var(--accent);
    text-transform: uppercase; margin-bottom: 14px;
    padding-left: 10px; position: relative; line-height: 1;
  }
  .dash-group-head::before {
    content: ''; position: absolute;
    left: 0; top: 50%; transform: translateY(-50%);
    width: 3px; height: 10px; background: var(--accent);
  }

  /* ---- fields (rows inside a group) ---- */
  .dash-field { margin-top: 14px; }
  .dash-field:first-of-type { margin-top: 12px; }
  .dash-field-label {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 9.5px; letter-spacing: 0.22em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 8px;
  }
  .dash-field-val {
    color: var(--fg); letter-spacing: 0.1em;
    font-variant-numeric: tabular-nums;
    font-size: 10px; text-transform: none;
  }
  .dash-field-foot {
    font-size: 9px; letter-spacing: 0.2em; color: var(--muted);
    margin-top: 8px;
  }

  /* ---- rows for buttons ---- */
  .dash-row { display: flex; gap: 6px; margin-bottom: 6px; }
  .dash-row:last-child { margin-bottom: 0; }
  .dash-row-plot { display: flex; gap: 16px; align-items: flex-end; }
  .dash-row-plot .dash-big { flex: 0 0 auto; }

  /* ---- big number (hero data) ---- */
  .dash-big {
    font-size: 26px; font-weight: 300; color: var(--fg);
    letter-spacing: 0.03em; line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .dash-sub { font-size: 12px; color: var(--muted); font-weight: 400; margin-left: 4px; }
  .dash-unit { font-size: 11px; color: var(--muted); letter-spacing: 0.15em; margin-left: 4px; }

  /* ---- bars ---- */
  .dash-bar {
    height: 3px; background: rgba(0, 229, 255, 0.08);
    margin-top: 10px; overflow: hidden;
  }
  .dash-fill {
    height: 100%; background: var(--accent);
    width: 0%; transition: width 0.12s linear;
  }
  .dash-fill.dash-red { background: #ff2a3a; }
  .dash-fill.dash-amber { background: #ffc03a; }

  /* ---- sparkline ---- */
  .dash-plot { flex: 1; height: 54px; }

  /* ---- gauges (unified label style to match .dash-field-label) ---- */
  .dash-gauges { display: flex; gap: 10px; }
  .dash-gauge {
    flex: 1;
    background: rgba(0, 229, 255, 0.025);
    padding: 10px 12px;
    border: 1px solid rgba(0, 229, 255, 0.12);
  }
  .dash-gauge-label {
    font-size: 9.5px; letter-spacing: 0.22em; color: var(--muted);
    margin-bottom: 8px; text-transform: uppercase;
    display: flex; justify-content: space-between;
  }
  .dash-gauge-val {
    font-size: 22px; line-height: 1; letter-spacing: 0.02em;
    font-variant-numeric: tabular-nums; color: var(--fg); font-weight: 300;
  }
  .dash-gauge-foot {
    font-size: 9px; letter-spacing: 0.2em; color: var(--muted); margin-top: 8px;
  }

  /* ---- primary action emphasis (contrast) ---- */
  .btn-primary {
    border-color: rgba(0, 229, 255, 0.45) !important;
    color: var(--fg) !important;
    background: rgba(0, 229, 255, 0.05) !important;
    letter-spacing: 0.2em !important;
  }
  .btn-primary:hover { background: rgba(0, 229, 255, 0.12) !important; color: var(--accent) !important; }

  /* ---- slider + ruler ---- */
  .slider-ctrl { position: relative; padding-bottom: 22px; }
  .slider-ruler {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 18px; pointer-events: none;
  }
  .rule-tick {
    position: absolute; top: 0;
    transform: translateX(-50%);
    font-size: 8.5px; letter-spacing: 0.06em;
    color: var(--muted); padding-top: 8px;
    white-space: nowrap;
  }
  .rule-tick::before {
    content: ''; position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 1px; height: 5px;
    background: rgba(0, 229, 255, 0.28);
  }
  .rule-tick.major { color: var(--fg); }
  .rule-tick.major::before { background: var(--accent); height: 7px; }
  .rule-tick b { font-weight: 400; }

  /* edge ticks stay inside panel */
  .rule-tick[style*="left:100%"] { transform: translateX(-100%); }
  .rule-tick[style*="left:100%"]::before { left: 100%; transform: translateX(-100%); }

  /* upload overlay */
  #upload {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    transition: opacity .3s ease;
  }
  body.dragging #upload { background: rgba(0, 229, 255, 0.05); }
  body.dragging .up-card { border-color: var(--accent); box-shadow: 0 0 40px rgba(0, 229, 255, 0.25) inset; }
  .up-card {
    padding: 40px 54px;
    border: 1px dashed var(--border);
    background: rgba(10, 10, 10, 0.6);
    text-align: center;
    min-width: 360px;
    transition: all .2s ease;
  }
  .up-title {
    font-size: 14px; letter-spacing: 0.32em; color: var(--accent);
    text-transform: uppercase; margin-bottom: 14px;
  }
  .up-sub {
    font-size: 11px; color: var(--fg); margin-bottom: 28px;
    letter-spacing: 0.12em; opacity: 0.85;
  }
  .up-sub b { color: var(--accent); font-weight: 500; letter-spacing: 0.15em; }
  .up-btn {
    display: inline-block; padding: 10px 26px;
    border: 1px solid var(--border);
    color: var(--fg); cursor: pointer;
    letter-spacing: 0.2em; font-size: 11px;
    text-transform: uppercase;
    transition: all .15s ease;
    user-select: none;
  }
  .up-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .up-hint { font-size: 9.5px; color: var(--muted); margin-top: 18px; letter-spacing: 0.18em; }
  .up-err { color: #ff6b6b; font-size: 10px; margin-top: 14px; min-height: 14px; letter-spacing: 0.05em; }
  .up-drop-hint {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    font-size: 12px; letter-spacing: 0.28em; color: var(--accent);
    opacity: 0; transition: opacity .15s ease;
    text-transform: uppercase;
  }
  body.dragging .up-drop-hint { opacity: 1; }

  /* scrubbable progress bar */
  .dash-scrub {
    position: relative;
    height: 16px;
    margin-top: 8px;
    cursor: ew-resize;
    user-select: none;
    touch-action: none;
  }
  .dash-scrub-track {
    position: absolute; left: 0; right: 0; top: 50%;
    transform: translateY(-50%);
    height: 3px;
    background: rgba(0, 229, 255, 0.08);
    overflow: hidden;
  }
  .dash-scrub-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.1s linear;
  }
  .dash-scrub-thumb {
    position: absolute; left: 0%; top: 50%;
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 8px rgba(0, 229, 255, 0.55);
    pointer-events: none;
    transition: transform 0.1s ease, box-shadow 0.15s ease, left 0.1s linear;
  }
  .dash-scrub:hover .dash-scrub-thumb {
    box-shadow: 0 0 12px rgba(0, 229, 255, 0.9);
  }
  .dash-scrub.scrubbing .dash-scrub-thumb,
  .dash-scrub.scrubbing .dash-scrub-fill { transition: none; }
  .dash-scrub.scrubbing .dash-scrub-thumb {
    transform: translate(-50%, -50%) scale(1.3);
    box-shadow: 0 0 14px rgba(0, 229, 255, 1);
  }
  #title { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.28em; margin-bottom: 10px; opacity: 0.85; }
  .row { display: flex; gap: 6px; margin-bottom: 6px; }
  button {
    flex: 1;
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--border);
    padding: 8px 10px;
    font: inherit;
    font-size: 10.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .15s ease;
  }
  button:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  button.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); box-shadow: 0 0 14px rgba(0,229,255,0.25) inset; }
  .kv { display: flex; justify-content: space-between; margin: 3px 0; color: #8fa4c4; }
  .kv b { color: var(--fg); font-weight: 500; }
  .slider { width: 100%; -webkit-appearance: none; appearance: none; height: 2px; background: var(--accent-dim); outline: none; margin: 4px 0 4px; position: relative; z-index: 2; }
  .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 11px; height: 11px; background: var(--accent); border-radius: 50%; cursor: pointer; box-shadow: 0 0 8px rgba(0,229,255,0.5); }
  .slider::-moz-range-thumb { width: 11px; height: 11px; background: var(--accent); border-radius: 50%; cursor: pointer; border: none; box-shadow: 0 0 8px rgba(0,229,255,0.5); }
  .grad { height: 8px; margin: 8px 0 4px; border-radius: 1px; border: 1px solid var(--border); }
  .grad-labels { display: flex; justify-content: space-between; font-size: 9.5px; color: #8fa4c4; }
  hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; opacity: 0.6; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="upload">
  <div class="up-card">
    <div class="up-title">Ride Visualizer</div>
    <div class="up-sub">Drop a Garmin <b>GPX</b> or <b>TCX</b> file</div>
    <label class="up-btn">
      <input type="file" id="fileInput" accept=".gpx,.tcx,.xml" hidden />
      <span>选 择 文 件</span>
    </label>
    <div class="up-hint">或拖拽到页面任意位置</div>
    <div class="up-err" id="uploadErr"></div>
  </div>
  <div class="up-drop-hint">释放以载入文件</div>
</div>

<div id="dashboard" class="panel">
  <div class="dash-title">
    <span>Ride Visualizer</span>
    <span class="dash-live"><span class="dot"></span><span>LIVE</span></span>
  </div>

  <section class="dash-group">
    <div class="dash-group-head">Controls</div>

    <div class="dash-row">
      <button id="btnPlay" class="btn-primary">▶ 开始追踪</button>
    </div>
    <div class="dash-row">
      <button id="btnReset">重置</button>
      <button id="btnView">复位视角</button>
    </div>

    <div class="dash-field">
      <div class="dash-field-label"><span>热区叠加</span></div>
      <div class="dash-row">
        <button id="btnNone" class="active">关闭</button>
        <button id="btnHR">心率</button>
        <button id="btnPW">功率</button>
      </div>
    </div>

    <div class="dash-field">
      <div class="dash-field-label"><span>速度</span><span class="dash-field-val" id="speedVal">1.00×</span></div>
      <div class="slider-ctrl">
        <input type="range" min="1" max="200" value="40" class="slider" id="speed" />
        <div class="slider-ruler">
          <span class="rule-tick" style="left:9.55%"><b>0.5</b></span>
          <span class="rule-tick major" style="left:19.6%"><b>1×</b></span>
          <span class="rule-tick" style="left:39.7%"><b>2</b></span>
          <span class="rule-tick" style="left:59.8%"><b>3</b></span>
          <span class="rule-tick" style="left:79.9%"><b>4</b></span>
          <span class="rule-tick" style="left:100%"><b>5</b></span>
        </div>
      </div>
    </div>

    <div class="dash-field">
      <div class="dash-field-label"><span>高程比例</span><span class="dash-field-val" id="vScaleVal">1.00×</span></div>
      <div class="slider-ctrl">
        <input type="range" min="1" max="40" step="1" value="12" class="slider" id="vScale" />
        <div class="slider-ruler">
          <span class="rule-tick" style="left:12.82%"><b>0.5</b></span>
          <span class="rule-tick major" style="left:28.21%"><b>1×</b></span>
          <span class="rule-tick" style="left:58.97%"><b>2</b></span>
          <span class="rule-tick" style="left:89.74%"><b>3</b></span>
        </div>
      </div>
    </div>
  </section>

  <section class="dash-group">
    <div class="dash-group-head">Telemetry</div>

    <div class="dash-field">
      <div class="dash-field-label"><span>Distance</span><span class="dash-field-val"><span id="sMove">1 / 4,000</span> pts</span></div>
      <div class="dash-big"><span id="sDist">0.00</span><span class="dash-sub">/ <span id="sDistTotal">0</span></span><span class="dash-unit">KM</span></div>
      <div class="dash-scrub" id="sProgBar">
        <div class="dash-scrub-track"><div class="dash-scrub-fill" id="sProgFill"></div></div>
        <div class="dash-scrub-thumb" id="sProgThumb"></div>
      </div>
      <div class="dash-field-foot"><span id="sProg">0.0</span>% complete</div>
    </div>

    <div class="dash-field">
      <div class="dash-field-label"><span>Elevation</span><span class="dash-field-val"><span id="sEleMin">min 0</span> · <span id="sEleMax">max 0</span></span></div>
      <div class="dash-row-plot">
        <div class="dash-big"><span id="sEle">0</span><span class="dash-unit">M</span></div>
        <svg class="dash-plot" viewBox="0 0 140 54" preserveAspectRatio="none">
          <path id="elePathFill" fill="rgba(0,229,255,0.08)" stroke="none"/>
          <path id="elePath" fill="none" stroke="rgba(0,229,255,0.55)" stroke-width="0.8"/>
          <line id="eleCursor" x1="0" y1="0" x2="0" y2="54" stroke="#ff2a3a" stroke-width="0.8"/>
          <circle id="eleDot" cx="0" cy="54" r="1.6" fill="#ff2a3a"/>
        </svg>
      </div>
    </div>

    <div class="dash-gauges">
      <div class="dash-gauge">
        <div class="dash-gauge-label"><span>HR</span><span>bpm</span></div>
        <div class="dash-gauge-val" id="sHr">---</div>
        <div class="dash-bar"><div class="dash-fill dash-red" id="sHrFill"></div></div>
        <div class="dash-gauge-foot" id="sHrRange">— / —</div>
      </div>
      <div class="dash-gauge">
        <div class="dash-gauge-label"><span>Power</span><span>W</span></div>
        <div class="dash-gauge-val" id="sPw">---</div>
        <div class="dash-bar"><div class="dash-fill dash-amber" id="sPwFill"></div></div>
        <div class="dash-gauge-foot" id="sPwRange">0 / —</div>
      </div>
    </div>
  </section>
</div>

<div id="legend" class="panel">
  <div id="title" id="legendTitle">图例</div>
  <div class="grad" id="legendGrad"></div>
  <div class="grad-labels"><span id="legendMin">0</span><span id="legendMax">0</span></div>
</div>

<div id="compass" class="panel">
  <svg viewBox="-50 -50 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="0" cy="0" r="42" fill="none" stroke="rgba(0,229,255,0.25)" stroke-width="0.6"/>
    <circle cx="0" cy="0" r="34" fill="none" stroke="rgba(0,229,255,0.15)" stroke-width="0.4"/>
    <g stroke="rgba(0,229,255,0.35)" stroke-width="0.5">
      <line x1="0" y1="-42" x2="0" y2="-36"/>
      <line x1="0" y1="42"  x2="0" y2="36"/>
      <line x1="-42" y1="0" x2="-36" y2="0"/>
      <line x1="42"  y1="0" x2="36"  y2="0"/>
    </g>
    <g id="compassRose">
      <polygon points="0,-34 6,0 0,6 -6,0" fill="#ff3ea5" opacity="0.95"/>
      <polygon points="0,34  6,0 0,-6 -6,0" fill="#00e5ff" opacity="0.55"/>
      <text x="0" y="-44" text-anchor="middle" fill="#ff3ea5" font-size="9" font-family="monospace" font-weight="700">N</text>
      <text x="0" y="50"  text-anchor="middle" fill="#6fa4c4" font-size="7.5" font-family="monospace">S</text>
      <text x="-45" y="3" text-anchor="middle" fill="#6fa4c4" font-size="7.5" font-family="monospace">W</text>
      <text x="45"  y="3" text-anchor="middle" fill="#6fa4c4" font-size="7.5" font-family="monospace">E</text>
    </g>
  </svg>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Line2 } from 'three/addons/lines/Line2.js';
import { LineMaterial } from 'three/addons/lines/LineMaterial.js';
import { LineGeometry } from 'three/addons/lines/LineGeometry.js';

/* ============================================================
 * Parsers — client-side GPX / TCX → packed data for the viz.
 * ============================================================ */
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000, rad = Math.PI / 180;
  const dlat = (lat2 - lat1) * rad;
  const dlon = (lon2 - lon1) * rad;
  const a = Math.sin(dlat/2)**2 + Math.cos(lat1*rad) * Math.cos(lat2*rad) * Math.sin(dlon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}
function getLocal(el, name) {
  const hits = el.getElementsByTagNameNS('*', name);
  return hits.length ? hits[0].textContent : '';
}
function getLocalNum(el, name) {
  const v = parseFloat(getLocal(el, name));
  return isFinite(v) ? v : 0;
}
function parseXML(text) {
  const doc = new DOMParser().parseFromString(text, 'text/xml');
  if (doc.getElementsByTagName('parsererror').length) throw new Error('XML 解析失败');
  return doc;
}
function parseGPX(text) {
  const doc = parseXML(text);
  const tps = doc.getElementsByTagNameNS('*', 'trkpt');
  const pts = [];
  for (let i = 0; i < tps.length; i++) {
    const tp = tps[i];
    const lat = parseFloat(tp.getAttribute('lat'));
    const lon = parseFloat(tp.getAttribute('lon'));
    if (!isFinite(lat) || !isFinite(lon)) continue;
    pts.push({
      lat, lon,
      ele: getLocalNum(tp, 'ele'),
      hr:  parseInt(getLocal(tp, 'hr')) || 0,
      w:   0,  // GPX typically carries no power
      d:   0,
    });
  }
  // cumulative distance via haversine
  let cum = 0;
  for (let i = 1; i < pts.length; i++) {
    cum += haversine(pts[i-1].lat, pts[i-1].lon, pts[i].lat, pts[i].lon);
    pts[i].d = cum;
  }
  return pts;
}
function parseTCX(text) {
  const doc = parseXML(text);
  const tps = doc.getElementsByTagNameNS('*', 'Trackpoint');
  const pts = [];
  let lastDist = 0;
  for (let i = 0; i < tps.length; i++) {
    const tp = tps[i];
    const pos = tp.getElementsByTagNameNS('*', 'Position')[0];
    if (!pos) continue;
    const lat = parseFloat(getLocal(pos, 'LatitudeDegrees'));
    const lon = parseFloat(getLocal(pos, 'LongitudeDegrees'));
    if (!isFinite(lat) || !isFinite(lon)) continue;
    const hrEl = tp.getElementsByTagNameNS('*', 'HeartRateBpm')[0];
    const hr = hrEl ? (parseInt(getLocal(hrEl, 'Value')) || 0) : 0;
    const watts = parseInt(getLocal(tp, 'Watts')) || 0;
    const d = getLocalNum(tp, 'DistanceMeters');
    pts.push({
      lat, lon,
      ele: getLocalNum(tp, 'AltitudeMeters'),
      hr, w: watts,
      d: d || lastDist,
    });
    if (d) lastDist = d;
  }
  // fill in distance if TCX didn't carry it
  if (pts.length && pts[pts.length-1].d === 0) {
    let cum = 0;
    for (let i = 1; i < pts.length; i++) {
      cum += haversine(pts[i-1].lat, pts[i-1].lon, pts[i].lat, pts[i].lon);
      pts[i].d = cum;
    }
  }
  return pts;
}
function projectAndPack(points, targetN = 4000) {
  if (points.length < 2) throw new Error('文件中没有足够的轨迹点');
  // centroid
  let latSum = 0, lonSum = 0;
  for (const p of points) { latSum += p.lat; lonSum += p.lon; }
  const lat0 = latSum / points.length, lon0 = lonSum / points.length;
  const R = 6371000, rad = Math.PI / 180;
  const cosLat0 = Math.cos(lat0 * rad);
  for (const p of points) {
    p.x = -R * (p.lon - lon0) * rad * cosLat0;  // +X = west so east sits on screen-right
    p.z =  R * (p.lat - lat0) * rad;             // +Z = north
    p.y = p.ele;
  }
  // uniform downsample (keep first + last)
  let pts = points;
  if (pts.length > targetN) {
    const step = pts.length / targetN;
    const out = new Array(targetN);
    for (let i = 0; i < targetN; i++) out[i] = pts[Math.min(pts.length - 1, Math.floor(i * step))];
    if (out[out.length - 1] !== pts[pts.length - 1]) out[out.length - 1] = pts[pts.length - 1];
    pts = out;
  }
  const N = pts.length;
  const x = new Float32Array(N), y = new Float32Array(N), z = new Float32Array(N);
  const hr = new Int16Array(N), w = new Int16Array(N), d = new Float32Array(N);
  let xMin=Infinity,xMax=-Infinity,yMin=Infinity,yMax=-Infinity,zMin=Infinity,zMax=-Infinity;
  let hrMin=Infinity,hrMax=-Infinity,wMax=-Infinity;
  for (let i = 0; i < N; i++) {
    const p = pts[i];
    x[i] = p.x; y[i] = p.y; z[i] = p.z; hr[i] = p.hr; w[i] = p.w; d[i] = p.d;
    if (p.x < xMin) xMin = p.x; if (p.x > xMax) xMax = p.x;
    if (p.y < yMin) yMin = p.y; if (p.y > yMax) yMax = p.y;
    if (p.z < zMin) zMin = p.z; if (p.z > zMax) zMax = p.z;
    if (p.hr > 0 && p.hr < hrMin) hrMin = p.hr;
    if (p.hr > hrMax) hrMax = p.hr;
    if (p.w  > wMax)  wMax  = p.w;
  }
  if (!isFinite(hrMin)) hrMin = 0;
  if (hrMax < 0) hrMax = 0;
  if (wMax  < 0) wMax  = 0;
  return {
    x, y, z, hr, w, d,
    stats: { n: N, xMin, xMax, yMin, yMax, zMin, zMax, hrMin, hrMax, wMax, distTotal: d[N-1] || 0 },
  };
}

/* ============================================================
 * Upload UI
 * ============================================================ */
const uploadEl = document.getElementById('upload');
const fileInput = document.getElementById('fileInput');
const uploadErr = document.getElementById('uploadErr');

async function handleFile(file) {
  try {
    uploadErr.textContent = '';
    const text = await file.text();
    const points = /TrainingCenterDatabase/i.test(text) ? parseTCX(text) : parseGPX(text);
    const data = projectAndPack(points);
    uploadEl.style.opacity = '0';
    setTimeout(() => { uploadEl.style.display = 'none'; }, 260);
    initViz(data);
  } catch (err) {
    uploadErr.textContent = '解析失败: ' + (err.message || err);
  }
}

fileInput.addEventListener('change', (e) => {
  const f = e.target.files && e.target.files[0];
  if (f) handleFile(f);
});

let dragDepth = 0;
window.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragDepth++;
  document.body.classList.add('dragging');
});
window.addEventListener('dragleave', (e) => {
  e.preventDefault();
  dragDepth = Math.max(0, dragDepth - 1);
  if (dragDepth === 0) document.body.classList.remove('dragging');
});
window.addEventListener('dragover', (e) => { e.preventDefault(); });
window.addEventListener('drop', (e) => {
  e.preventDefault();
  dragDepth = 0;
  document.body.classList.remove('dragging');
  const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
  if (f) handleFile(f);
});

/* ============================================================
 * Viz — called once a dataset has been parsed.
 * ============================================================ */
function initViz(DATA) {
const N = DATA.stats.n;

/* --- scale into a comfortable box --- */
const spanX = DATA.stats.xMax - DATA.stats.xMin;
const spanZ = DATA.stats.zMax - DATA.stats.zMin;
const spanY = DATA.stats.yMax - DATA.stats.yMin;
const horizSpan = Math.max(spanX, spanZ);
const BOX = 200;
const scaleH = BOX / horizSpan;
const V_MULT_INIT = 12;
let verticalMult = V_MULT_INIT;
let scaleV = scaleH * verticalMult;  // mutable — updated when user drags the 高程比例 slider
const cx = (DATA.stats.xMin + DATA.stats.xMax) / 2;
const cz = (DATA.stats.zMin + DATA.stats.zMax) / 2;
const cy = DATA.stats.yMin;

const pts3 = new Float32Array(N * 3);
for (let i = 0; i < N; i++) {
  pts3[i*3  ] = (DATA.x[i] - cx) * scaleH;
  pts3[i*3+1] = (DATA.y[i] - cy) * scaleV;
  pts3[i*3+2] = (DATA.z[i] - cz) * scaleH;
}

/* --- scene --- */
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x0d0d0d, 1);
renderer.toneMapping = THREE.NoToneMapping;

const scene = new THREE.Scene();
// no fog — fog blends scene color into bg and can lift blacks

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, BOX * 10);
// camera south of scene looking north → +Z (north) goes "away" from viewer like a map
const homePos = new THREE.Vector3(BOX * 0.85, BOX * 0.7, -BOX * 1.15);
camera.position.copy(homePos);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, spanY * scaleV * 0.3, 0);
controls.maxPolarAngle = Math.PI * 0.49;
controls.enablePan = true;
controls.screenSpacePanning = true;
controls.panSpeed = 0.9;
controls.mouseButtons = {
  LEFT:   THREE.MOUSE.ROTATE,
  MIDDLE: THREE.MOUSE.PAN,
  RIGHT:  THREE.MOUSE.PAN,
};
controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };

/* --- grid (dense, soft, layered) --- */
const gridSize = BOX * 1.8;

// fine grid: dense minor lines
const gridFine = new THREE.GridHelper(gridSize, 120, 0x1a4a66, 0x1a4a66);
gridFine.material.transparent = true;
gridFine.material.opacity = 0.10;
gridFine.material.depthWrite = false;
scene.add(gridFine);

// medium grid: every 5th subdivision, slightly brighter
const gridMed = new THREE.GridHelper(gridSize, 24, 0x2fb8d6, 0x2fb8d6);
gridMed.material.transparent = true;
gridMed.material.opacity = 0.18;
gridMed.material.depthWrite = false;
scene.add(gridMed);

// outer frame: single bright rect on ground
const frameMat = new THREE.LineBasicMaterial({ color: 0x00e5ff, transparent:true, opacity: 0.22 });
const h = gridSize/2;
const framePts = [
  new THREE.Vector3(-h, 0, -h), new THREE.Vector3( h, 0, -h),
  new THREE.Vector3( h, 0, -h), new THREE.Vector3( h, 0,  h),
  new THREE.Vector3( h, 0,  h), new THREE.Vector3(-h, 0,  h),
  new THREE.Vector3(-h, 0,  h), new THREE.Vector3(-h, 0, -h),
];
const frameGeom = new THREE.BufferGeometry().setFromPoints(framePts);
scene.add(new THREE.LineSegments(frameGeom, frameMat));

// vertical side rails at corners for depth — geoms kept so we can rescale Y later
const railMat = new THREE.LineBasicMaterial({ color: 0x00e5ff, transparent:true, opacity: 0.12 });
const railCorners = [[-h, -h], [ h, -h], [ h,  h], [-h,  h]];
const railGeom = new THREE.BufferGeometry();
scene.add(new THREE.LineSegments(railGeom, railMat));

const ceilMat = new THREE.LineBasicMaterial({ color: 0x00e5ff, transparent:true, opacity: 0.08 });
const ceilGeom = new THREE.BufferGeometry();
scene.add(new THREE.LineSegments(ceilGeom, ceilMat));

function rebuildFrameGeoms(topY) {
  const rp = [];
  for (const [rx, rz] of railCorners) {
    rp.push(new THREE.Vector3(rx, 0, rz), new THREE.Vector3(rx, topY, rz));
  }
  railGeom.setFromPoints(rp);
  const cp = framePts.map(p => new THREE.Vector3(p.x, topY, p.z));
  ceilGeom.setFromPoints(cp);
}
rebuildFrameGeoms(spanY * scaleV * 1.4 + 20);

/* --- vertical scale slider: rescale pts3 Y and frame geoms in place --- */
function setVerticalMult(mult) {
  verticalMult = mult;
  scaleV = scaleH * mult;
  for (let i = 0; i < N; i++) {
    pts3[i*3+1] = (DATA.y[i] - cy) * scaleV;
  }
  routeGeom.setPositions(pts3);
  rebuildFrameGeoms(spanY * scaleV * 1.4 + 20);
  // keep marker glued to its current route vertex
  if (marker && marker.visible) {
    const idx = Math.max(0, Math.min(N - 1, Math.round(progress)));
    marker.position.y = pts3[idx*3+1];
  }
}

/* --- route line (single object, dynamic vertex colors) --- */
const resolution = new THREE.Vector2(window.innerWidth, window.innerHeight);

const CYAN = [0.0, 0.9, 1.0];
const RED  = [1.0, 0.165, 0.227];

function heatColor(t) {
  const stops = [
    [0.0, [0.0, 0.3, 0.7]],
    [0.3, [0.0, 0.9, 1.0]],
    [0.6, [1.0, 0.95, 0.2]],
    [1.0, [1.0, 0.24, 0.65]],
  ];
  for (let i = 0; i < stops.length-1; i++) {
    const [a, ca] = stops[i], [b, cb] = stops[i+1];
    if (t <= b) {
      const k = (t - a) / (b - a);
      return [ca[0]+(cb[0]-ca[0])*k, ca[1]+(cb[1]-ca[1])*k, ca[2]+(cb[2]-ca[2])*k];
    }
  }
  return stops[stops.length-1][1];
}

function computeBaseColors(mode) {
  const c = new Float32Array(N * 3);
  if (mode === 'hr') {
    const minV = DATA.stats.hrMin || 60, maxV = DATA.stats.hrMax || 180;
    const span = Math.max(1e-6, maxV - minV);
    for (let i = 0; i < N; i++) {
      const v = DATA.hr[i];
      const t = v > 0 ? Math.min(1, Math.max(0, (v - minV) / span)) : 0;
      const col = heatColor(t);
      c[i*3] = col[0]; c[i*3+1] = col[1]; c[i*3+2] = col[2];
    }
  } else if (mode === 'pw') {
    const maxV = DATA.stats.wMax || 400;
    for (let i = 0; i < N; i++) {
      const v = DATA.w[i];
      const t = v > 0 ? Math.min(1, Math.max(0, v / maxV)) : 0;
      const col = heatColor(t);
      c[i*3] = col[0]; c[i*3+1] = col[1]; c[i*3+2] = col[2];
    }
  } else {
    for (let i = 0; i < N; i++) {
      c[i*3] = CYAN[0]; c[i*3+1] = CYAN[1]; c[i*3+2] = CYAN[2];
    }
  }
  return c;
}

let baseColors = computeBaseColors('none');
let displayColors = new Float32Array(baseColors);
let passedIdx = -1;

const routeGeom = new LineGeometry();
routeGeom.setPositions(pts3);
routeGeom.setColors(displayColors);
const routeMat = new LineMaterial({
  color: 0xffffff,
  linewidth: 0.9,
  transparent: true,
  opacity: 0.95,
  vertexColors: true,
  worldUnits: true,
  resolution,
});
const routeLine = new Line2(routeGeom, routeMat);
scene.add(routeLine);

function applyTrailOverlay() {
  displayColors.set(baseColors);
  for (let k = 0; k <= passedIdx && k < N; k++) {
    displayColors[k*3]   = RED[0];
    displayColors[k*3+1] = RED[1];
    displayColors[k*3+2] = RED[2];
  }
  routeGeom.setColors(displayColors);
}

/* --- drop shadow (projection) --- */
const shadowPts = new Float32Array(N * 3);
for (let i = 0; i < N; i++) {
  shadowPts[i*3  ] = pts3[i*3];
  shadowPts[i*3+1] = 0;
  shadowPts[i*3+2] = pts3[i*3+2];
}
const shadowGeom = new LineGeometry();
shadowGeom.setPositions(shadowPts);
const shadowMat = new LineMaterial({
  color: 0x4d6b7a,
  linewidth: 0.45,
  transparent: true,
  opacity: 0.32,
  worldUnits: true,
  resolution,
});
scene.add(new Line2(shadowGeom, shadowMat));

/* --- rider marker --- */
const markerGeo = new THREE.SphereGeometry(1.4, 20, 20);
const markerMat = new THREE.MeshBasicMaterial({ color: 0xff2a3a });
const marker = new THREE.Mesh(markerGeo, markerMat);
marker.visible = false;
scene.add(marker);

// glow ring
const ringGeo = new THREE.RingGeometry(1.8, 2.6, 32);
const ringMat = new THREE.MeshBasicMaterial({ color: 0xff2a3a, transparent:true, opacity:0.55, side: THREE.DoubleSide });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = -Math.PI/2;
ring.visible = false;
scene.add(ring);

/* --- no post-processing: direct render to keep true blacks --- */

/* --- mode switching: recompute base colors, keep overlay --- */
let currentMode = 'none';
function setMode(mode) {
  currentMode = mode;
  baseColors = computeBaseColors(mode);
  const legend = document.getElementById('legend');
  const grad = document.getElementById('legendGrad');
  const lmin = document.getElementById('legendMin');
  const lmax = document.getElementById('legendMax');
  if (mode === 'hr') {
    legend.style.display = 'block';
    legend.querySelector('#title').textContent = '心率 · bpm';
    lmin.textContent = (DATA.stats.hrMin || 60);
    lmax.textContent = (DATA.stats.hrMax || 180);
    grad.style.background = gradientCSS();
  } else if (mode === 'pw') {
    legend.style.display = 'block';
    legend.querySelector('#title').textContent = '功率 · W';
    lmin.textContent = '0';
    lmax.textContent = (DATA.stats.wMax || 400);
    grad.style.background = gradientCSS();
  } else {
    legend.style.display = 'none';
  }
  applyTrailOverlay();
  updateButtons();
}

function gradientCSS() {
  const stops = [];
  for (let t = 0; t <= 1.01; t += 0.1) {
    const c = heatColor(Math.min(1, t));
    stops.push(`rgb(${Math.round(c[0]*255)},${Math.round(c[1]*255)},${Math.round(c[2]*255)}) ${Math.round(t*100)}%`);
  }
  return `linear-gradient(to right, ${stops.join(',')})`;
}

function updateButtons() {
  for (const id of ['btnNone','btnHR','btnPW']) {
    document.getElementById(id).classList.remove('active');
  }
  document.getElementById({none:'btnNone', hr:'btnHR', pw:'btnPW'}[currentMode]).classList.add('active');
}

document.getElementById('btnNone').onclick = () => setMode('none');
document.getElementById('btnHR').onclick   = () => setMode('hr');
document.getElementById('btnPW').onclick   = () => setMode('pw');

/* --- playback --- */
let playing = false;
let progress = 0; // 0..N-1 fractional
/* --- sliders: display as ratio vs default (1×), snap to 1× when close --- */
const SPEED_DEFAULT = 40;
const V_DEFAULT = V_MULT_INIT;
const SNAP = 0.05;
function fmtRatio(v, base) {
  const r = v / base;
  if (Math.abs(r - 1) < SNAP) return '1.00×';
  return r.toFixed(2) + '×';
}

const speedInput = document.getElementById('speed');
const speedVal = document.getElementById('speedVal');
speedInput.addEventListener('input', () => {
  let v = parseFloat(speedInput.value);
  if (Math.abs(v / SPEED_DEFAULT - 1) < SNAP) {
    v = SPEED_DEFAULT;
    speedInput.value = String(SPEED_DEFAULT);
  }
  speedVal.textContent = fmtRatio(v, SPEED_DEFAULT);
});

const vScaleInput = document.getElementById('vScale');
const vScaleVal = document.getElementById('vScaleVal');
vScaleInput.addEventListener('input', () => {
  let v = parseFloat(vScaleInput.value);
  if (Math.abs(v / V_DEFAULT - 1) < SNAP) {
    v = V_DEFAULT;
    vScaleInput.value = String(V_DEFAULT);
  }
  vScaleVal.textContent = fmtRatio(v, V_DEFAULT);
  setVerticalMult(v);
});

/* --- seek helper: jumps to an arbitrary index and refreshes trail + marker --- */
function seekTo(idx) {
  idx = Math.max(0, Math.min(N - 1, idx));
  progress = idx;
  passedIdx = Math.floor(idx);
  const i = passedIdx;
  marker.position.set(pts3[i*3], pts3[i*3+1], pts3[i*3+2]);
  ring.position.set(pts3[i*3], 0.5, pts3[i*3+2]);
  marker.visible = true;
  ring.visible = true;
  applyTrailOverlay();
  updateStats(idx);
}

/* --- scrubbable progress bar (grab DOM locally to avoid TDZ on module-scope consts) --- */
(() => {
  const bar = document.getElementById('sProgBar');
  let scrubbing = false;
  let activePtr = null;
  function fromEvent(clientX) {
    const rect = bar.getBoundingClientRect();
    const t = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    return Math.round(t * (N - 1));
  }
  bar.addEventListener('pointerdown', (e) => {
    scrubbing = true;
    activePtr = e.pointerId;
    try { bar.setPointerCapture(e.pointerId); } catch (_) {}
    bar.classList.add('scrubbing');
    if (playing) {
      playing = false;
      const btn = document.getElementById('btnPlay');
      btn.textContent = '▶ 开始追踪';
      btn.classList.remove('active');
    }
    seekTo(fromEvent(e.clientX));
  });
  bar.addEventListener('pointermove', (e) => {
    if (scrubbing && e.pointerId === activePtr) seekTo(fromEvent(e.clientX));
  });
  const endScrub = (e) => {
    if (!scrubbing) return;
    scrubbing = false;
    activePtr = null;
    bar.classList.remove('scrubbing');
    try { bar.releasePointerCapture(e.pointerId); } catch (_) {}
  };
  bar.addEventListener('pointerup', endScrub);
  bar.addEventListener('pointercancel', endScrub);
})();

const btnPlay = document.getElementById('btnPlay');
btnPlay.onclick = () => {
  playing = !playing;
  btnPlay.textContent = playing ? '⏸ 暂停追踪' : '▶ 开始追踪';
  btnPlay.classList.toggle('active', playing);
  if (playing) {
    marker.visible = true;
    ring.visible = true;
  }
};

document.getElementById('btnReset').onclick = () => {
  playing = false;
  progress = 0;
  passedIdx = -1;
  btnPlay.textContent = '▶ 开始追踪';
  btnPlay.classList.remove('active');
  marker.visible = false;
  ring.visible = false;
  applyTrailOverlay();
  updateStats(0);
};

document.getElementById('btnView').onclick = () => {
  camera.position.copy(homePos);
  controls.target.set(0, spanY * scaleV * 0.3, 0);
  controls.update();
};

/* --- dashboard bindings + elevation sparkline --- */
const sDist = document.getElementById('sDist');
const sDistTotal = document.getElementById('sDistTotal');
const sProg = document.getElementById('sProg');
const sProgFill = document.getElementById('sProgFill');
const sProgThumb = document.getElementById('sProgThumb');
const sProgBar = document.getElementById('sProgBar');
const sMove = document.getElementById('sMove');
const sEle = document.getElementById('sEle');
const sHr = document.getElementById('sHr');
const sPw = document.getElementById('sPw');
const sHrFill = document.getElementById('sHrFill');
const sPwFill = document.getElementById('sPwFill');
const sHrRange = document.getElementById('sHrRange');
const sPwRange = document.getElementById('sPwRange');
const sEleMin = document.getElementById('sEleMin');
const sEleMax = document.getElementById('sEleMax');
const eleCursor = document.getElementById('eleCursor');
const eleDot = document.getElementById('eleDot');

sDistTotal.textContent = (DATA.stats.distTotal/1000).toFixed(2);
const HR_MAX = DATA.stats.hrMax || 200;
const PW_MAX = DATA.stats.wMax  || 400;
sHrRange.textContent = `${DATA.stats.hrMin || 0} / ${HR_MAX} bpm`;
sPwRange.textContent = `0 / ${PW_MAX} W`;
sEleMin.textContent = `min ${DATA.stats.yMin.toFixed(0)} m`;
sEleMax.textContent = `max ${DATA.stats.yMax.toFixed(0)} m`;

/* elevation sparkline — precompute paths in viewBox 140 × 54 */
(() => {
  const vbW = 140, vbH = 54, pad = 3;
  const yMin = DATA.stats.yMin, yMax = DATA.stats.yMax;
  const yRange = Math.max(1, yMax - yMin);
  const px = (i) => (i / Math.max(1, N-1)) * vbW;
  const py = (e) => vbH - pad - ((e - yMin) / yRange) * (vbH - pad * 2);
  let d = '';
  let df = `M ${px(0)} ${vbH} `;
  const step = Math.max(1, Math.floor(N / 200));
  for (let i = 0; i < N; i += step) {
    const x = px(i), y = py(DATA.y[i]);
    d  += (i === 0 ? `M ${x.toFixed(1)} ${y.toFixed(1)}` : ` L ${x.toFixed(1)} ${y.toFixed(1)}`);
    df += `L ${x.toFixed(1)} ${y.toFixed(1)} `;
  }
  // close to baseline for filled area
  df += `L ${vbW} ${vbH} Z`;
  document.getElementById('elePath').setAttribute('d', d);
  document.getElementById('elePathFill').setAttribute('d', df);
})();

function updateStats(i) {
  i = Math.max(0, Math.min(N-1, Math.round(i)));
  const prog = i / Math.max(1, N-1);
  const dist = DATA.d[i] / 1000;
  const ele = DATA.y[i];
  const hr  = DATA.hr[i] || 0;
  const pw  = DATA.w[i] || 0;

  sDist.textContent = dist.toFixed(2);
  sProg.textContent = (prog * 100).toFixed(1);
  sProgFill.style.width = (prog * 100).toFixed(2) + '%';
  sProgThumb.style.left = (prog * 100).toFixed(2) + '%';
  sMove.textContent = `${(i+1).toLocaleString()} / ${N.toLocaleString()}`;
  sEle.textContent = ele.toFixed(0);
  sHr.textContent  = hr || '---';
  sPw.textContent  = pw || '---';
  sHrFill.style.width = Math.min(100, (hr / HR_MAX) * 100).toFixed(1) + '%';
  sPwFill.style.width = Math.min(100, (pw / PW_MAX) * 100).toFixed(1) + '%';

  // sparkline cursor
  const vbW = 140, vbH = 54, pad = 3;
  const yRange = Math.max(1, DATA.stats.yMax - DATA.stats.yMin);
  const cx = (i / Math.max(1, N-1)) * vbW;
  const cy = vbH - pad - ((ele - DATA.stats.yMin) / yRange) * (vbH - pad * 2);
  eleCursor.setAttribute('x1', cx);
  eleCursor.setAttribute('x2', cx);
  eleDot.setAttribute('cx', cx);
  eleDot.setAttribute('cy', cy);
}
updateStats(0);

/* --- compass: rotate rose so N points to world +Z projected onto screen --- */
const compassRose = document.getElementById('compassRose');
const _camDir = new THREE.Vector3();
function updateCompass() {
  camera.getWorldDirection(_camDir);
  // coord convention: +Z is north, +X is west (so -X is east)
  // yaw = camera heading measured from north (+Z), positive = clockwise from above
  const yaw = Math.atan2(-_camDir.x, _camDir.z);
  // rotate the compass rose opposite to yaw so the N marker always points to world north
  const deg = -yaw * 180 / Math.PI;
  compassRose.setAttribute('transform', `rotate(${deg})`);
}

/* --- animate --- */
const clock = new THREE.Clock();
function animate() {
  const dt = clock.getDelta();
  if (playing) {
    const speed = parseFloat(speedInput.value);
    progress += dt * speed;
    if (progress >= N - 1) {
      progress = N - 1;
      playing = false;
      btnPlay.textContent = '▶ 开始追踪';
      btnPlay.classList.remove('active');
    }
    const i = Math.floor(progress);
    const frac = progress - i;
    const ix = i*3, jx = Math.min((i+1)*3, (N-1)*3);
    const x = pts3[ix]   + (pts3[jx]   - pts3[ix])*frac;
    const y = pts3[ix+1] + (pts3[jx+1] - pts3[ix+1])*frac;
    const z = pts3[ix+2] + (pts3[jx+2] - pts3[ix+2])*frac;
    marker.position.set(x, y, z);
    ring.position.set(x, 0.5, z);

    // extend trail overlay on the main route when we advance to a new vertex
    if (i > passedIdx) {
      passedIdx = i;
      applyTrailOverlay();
    }

    updateStats(progress);
  }

  // marker pulse
  if (marker.visible) {
    const s = 1 + Math.sin(clock.elapsedTime * 4) * 0.15;
    marker.scale.setScalar(s);
    ring.scale.setScalar(1 + Math.sin(clock.elapsedTime * 2) * 0.4);
    ring.material.opacity = 0.5 - Math.sin(clock.elapsedTime * 2) * 0.25;
  }

  controls.update();
  updateCompass();
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

/* --- resize --- */
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  resolution.set(w, h);
});

} // end initViz
</script>
</body>
